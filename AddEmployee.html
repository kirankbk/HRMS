

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employee Management</title>

    <!-- Bootstrap -->
    <!-- Bootstrap -->
					<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom CSS -->

    <link rel="stylesheet" href="css/employee1.css">
	<script src="employees1.js"></script>
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<body>

<div >

    <div>
  <div>
        <div>

            <!-- ================= Header ================= -->

            <div class="modal-header bg-primary text-white">

                <div>

                    <h3 class="modal-title mb-1"
                        id="addEmployeeModalLabel">

                        <i class="fa fa-user-plus me-2"></i>

                        Add New Employee

                    </h3>

                    <small>
                        Employee Registration & Payroll Information
                    </small>

                </div>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <!-- ================= Form ================= -->

            <form id="addEmployeeForm"
                  enctype="multipart/form-data"
                  novalidate>

                <div class="modal-body bg-light">

                    <!-- ================================= -->
                    <!-- Employee Photo -->
                    <!-- ================================= -->

                    <div class="card shadow-sm border-0 mb-4">

                        <div class="card-body text-center">

                            <img
                                id="photoPreview"
                                src="images/default-user.png"
                                class="rounded-circle border shadow"
                                width="150"
                                height="150"
                                style="object-fit:cover;">

                            <br><br>

                            <input
                                type="file"
                                id="employeePhoto"
                                class="form-control w-25 mx-auto"
                                accept="image/*">

                            <small class="text-muted">
                                Upload Employee Photo
                            </small>

                        </div>

                    </div>

                    <!-- ================================= -->
                    <!-- Personal Information -->
                    <!-- ================================= -->

                    <div class="card shadow-sm mb-4">

                        <div class="card-header bg-success text-white">

                            <h5 class="mb-0">

                                <i class="fa fa-id-card me-2"></i>

                                Personal Information

                            </h5>

                        </div>

                        <div class="card-body">

                            <div class="row">

                                <!-- Employee Code -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Employee Code

                                    </label>

                                    <input
                                        type="text"
                                        id="employeeCode"
                                        class="form-control"
                                        readonly>

                                </div>

                                <!-- First Name -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        First Name
                                        <span class="text-danger">*</span>

                                    </label>

                                    <input
                                        type="text"
                                        id="firstName"
                                        class="form-control"
                                        maxlength="100"
                                        required>

                                    <div class="invalid-feedback">

                                        First Name is required.

                                    </div>

                                </div>

                                <!-- Last Name -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Last Name
                                        <span class="text-danger">*</span>

                                    </label>

                                    <input
                                        type="text"
                                        id="lastName"
                                        class="form-control"
                                        maxlength="100"
                                        required>

                                </div>

                                <!-- Gender -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Gender

                                    </label>

                                    <select
                                        id="gender"
                                        class="form-select">

                                        <option value="">
                                            Select
                                        </option>

                                        <option value="Male">
                                            Male
                                        </option>

                                        <option value="Female">
                                            Female
                                        </option>

                                        <option value="Other">
                                            Other
                                        </option>

                                    </select>

                                </div>

                                <!-- DOB -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Date of Birth

                                    </label>

                                    <input
                                        type="date"
                                        id="dob"
                                        class="form-control">

                                </div>

                                <!-- Mobile -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Mobile Number
                                        <span class="text-danger">*</span>

                                    </label>

                                    <input
                                        type="tel"
                                        id="mobile"
                                        class="form-control"
                                        maxlength="10"
                                        required>

                                </div>

                                <!-- Email -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Email

                                    </label>

                                    <input
                                        type="email"
                                        id="email"
                                        class="form-control">

                                </div>

                                <!-- Aadhaar -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Aadhaar Number

                                    </label>

                                    <input
                                        type="text"
                                        id="aadharNo"
                                        class="form-control"
                                        maxlength="12">

                                </div>

                                <!-- PAN -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        PAN Number

                                    </label>

                                    <input
                                        type="text"
                                        id="panNo"
                                        class="form-control"
                                        maxlength="10">

                                </div>

                                <!-- Blood Group -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Blood Group

                                    </label>

                                    <select
                                        id="bloodGroup"
                                        class="form-select">

                                        <option value="">
                                            Select
                                        </option>

                                        <option>A+</option>
                                        <option>A-</option>
                                        <option>B+</option>
                                        <option>B-</option>
                                        <option>AB+</option>
                                        <option>AB-</option>
                                        <option>O+</option>
                                        <option>O-</option>

                                    </select>

                                </div>

                                <!-- Marital Status -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Marital Status

                                    </label>

                                    <select
                                        id="maritalStatus"
                                        class="form-select">

                                        <option value="">
                                            Select
                                        </option>

                                        <option>Single</option>
                                        <option>Married</option>
                                        <option>Divorced</option>
                                        <option>Widowed</option>

                                    </select>

                                </div>

                                <!-- Nationality -->

                                <div class="col-lg-3 col-md-6 mb-3">

                                    <label class="form-label">

                                        Nationality

                                    </label>

                                    <input
                                        type="text"
                                        id="nationality"
                                        class="form-control"
                                        value="Indian">

                                </div>
								
	</div></div></div>
								<!-- ==========================================================
     Login Details
=========================================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-dark text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-user-lock me-2"></i>

            Login Account

        </h5>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-lg-4 mb-3">

                <label class="form-label">

                    Username

                </label>

                <input
                    type="text"
                    id="username"
                    class="form-control">

            </div>

            <div class="col-lg-4 mb-3">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    id="password"
                    class="form-control">

            </div>

            <div class="col-lg-4 mb-3">

                <label class="form-label">

                    Confirm Password

                </label>

                <input
                    type="password"
                    id="confirmPassword"
                    class="form-control">

            </div>

            <div class="col-lg-4 mb-3">

                <label class="form-label">

                    User Role

                </label>

                <select
                    id="role"
                    class="form-select">

                    <option>Employee</option>
                    <option>HR</option>
                    <option>Manager</option>
                    <option>Admin</option>

                </select>

            </div>

            <div class="col-lg-4 mb-3">

                <label class="form-label">

                    Account Status

                </label>

                <select
                    id="accountStatus"
                    class="form-select">

                    <option value="Active">

                        Active

                    </option>

                    <option value="Inactive">

                        Inactive

                    </option>

                </select>

            </div>

        </div>

    </div>

</div>

                    <!-- Employment Details Section -->
					
					<!-- ==========================================================
     Employment Details
=========================================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-info text-white">

        <h5 class="mb-0">

            <i class="fa fa-briefcase me-2"></i>

            Employment Details

        </h5>

    </div>

    <div class="card-body">

        <div class="row">

            <!-- Department -->

            <div class="col-lg-4 col-md-6 mb-3">

                <label class="form-label">

                    Department
                    <span class="text-danger">*</span>

                </label>

                <select
                    id="department"
                    class="form-select"
                    required>

                    <option value="">
                        Select Department
                    </option>

                </select>

            </div>

            <!-- Designation -->

            <div class="col-lg-4 col-md-6 mb-3">

                <label class="form-label">

                    Designation
                    <span class="text-danger">*</span>

                </label>

                <select
                    id="designation"
                    class="form-select"
                    required>

                    <option value="">
                        Select Designation
                    </option>

                </select>

            </div>

            <!-- Joining Date -->

            <div class="col-lg-4 col-md-6 mb-3">

                <label class="form-label">

                    Joining Date

                </label>

                <input
                    type="date"
                    id="joiningDate"
                    class="form-control">

            </div>

            <!-- Employment Type -->

            <div class="col-lg-4 col-md-6 mb-3">

                <label class="form-label">

                    Employment Type

                </label>

                <select
                    id="employmentType"
                    class="form-select">

                    <option value="">
                        Select
                    </option>

                    <option>Permanent</option>
                    <option>Contract</option>
                    <option>Temporary</option>
                    <option>Intern</option>

                </select>

            </div>

            <!-- Shift -->

            <div class="col-lg-4 col-md-6 mb-3">

                <label class="form-label">

                    Shift

                </label>

                <select
                    id="shift"
                    class="form-select">

                    <option value="">
                        Select Shift
                    </option>

                    <option>General</option>
                    <option>Morning</option>
                    <option>Evening</option>
                    <option>Night</option>

                </select>

            </div>

            <!-- Reporting Manager -->

            <div class="col-lg-4 col-md-6 mb-3">

                <label class="form-label">

                    Reporting Manager

                </label>

                <select
                    id="reportingManager"
                    class="form-select">

                    <option value="">
                        Select Manager
                    </option>

                </select>

            </div>

            <!-- Employee Status -->

            <div class="col-lg-4 col-md-6 mb-3">

                <label class="form-label">

                    Employee Status

                </label>

                <select
                    id="employeeStatus"
                    class="form-select">

                    <option value="Active">
                        Active
                    </option>

                    <option value="Inactive">
                        Inactive
                    </option>

                    <option value="On Leave">
                        On Leave
                    </option>

                    <option value="Resigned">
                        Resigned
                    </option>

                </select>

            </div>

            <!-- Employee Type -->

            <div class="col-lg-4 col-md-6 mb-3">

                <label class="form-label">

                    Employee Category

                </label>

                <select
                    id="employeeCategory"
                    class="form-select">

                    <option>Full Time</option>
                    <option>Part Time</option>
                    <option>Consultant</option>
                    <option>Trainee</option>

                </select>

            </div>

            <!-- Weekly Off -->

            <div class="col-lg-4 col-md-6 mb-3">

                <label class="form-label">

                    Weekly Off

                </label>

                <select
                    id="weeklyOff"
                    class="form-select">

                    <option>Sunday</option>
                    <option>Saturday</option>
                    <option>Friday</option>

                </select>

            </div>

        </div>
		</div></div>
<!-- ==========================================================
     Modal Footer
=========================================================== -->
<!-- ==========================================================
     Salary Information
=========================================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-warning">

        <h5 class="mb-0">

            <i class="fa fa-indian-rupee-sign me-2"></i>

            Salary Information

        </h5>

    </div>

    <div class="card-body">

        <div class="row">

            <!-- Basic Salary -->

            <div class="col-lg-3 col-md-6 mb-3">

                <label class="form-label">

                    Basic Salary

                </label>

                <input
                    type="number"
                    id="basicSalary"
                    class="form-control salary-input"
                    value="0"
                    min="0">

            </div>

            <!-- HRA -->

            <div class="col-lg-3 col-md-6 mb-3">

                <label class="form-label">

                    HRA

                </label>

                <input
                    type="number"
                    id="hra"
                    class="form-control salary-input"
                    value="0"
                    min="0">

            </div>

            <!-- Medical -->

            <div class="col-lg-3 col-md-6 mb-3">

                <label class="form-label">

                    Medical Allowance

                </label>

                <input
                    type="number"
                    id="medicalAllowance"
                    class="form-control salary-input"
                    value="0"
                    min="0">

            </div>

            <!-- Travel -->

            <div class="col-lg-3 col-md-6 mb-3">

                <label class="form-label">

                    Travel Allowance

                </label>

                <input
                    type="number"
                    id="travelAllowance"
                    class="form-control salary-input"
                    value="0"
                    min="0">

            </div>

            <!-- Other -->

            <div class="col-lg-3 col-md-6 mb-3">

                <label class="form-label">

                    Other Allowance

                </label>

                <input
                    type="number"
                    id="otherAllowance"
                    class="form-control salary-input"
                    value="0"
                    min="0">

            </div>

            <!-- Bonus -->

            <div class="col-lg-3 col-md-6 mb-3">

                <label class="form-label">

                    Bonus

                </label>

                <input
                    type="number"
                    id="bonus"
                    class="form-control salary-input"
                    value="0"
                    min="0">

            </div>

            <!-- Overtime Rate -->

            <div class="col-lg-3 col-md-6 mb-3">

                <label class="form-label">

                    Overtime Rate / Hour

                </label>

                <input
                    type="number"
                    id="overtimeRate"
                    class="form-control"
                    value="0">

            </div>

            <!-- Gross Salary -->

            <div class="col-lg-3 col-md-6 mb-3">

                <label class="form-label fw-bold">

                    Gross Salary

                </label>

                <input
                    type="number"
                    id="grossSalary"
                    class="form-control bg-light fw-bold"
                    readonly>

            </div>

            <!-- PF -->

            <div class="col-lg-2 col-md-4 mb-3">

                <label class="form-label">

                    PF

                </label>

                <input
                    type="number"
                    id="pf"
                    class="form-control"
                    value="0">

            </div>

            <!-- ESIC -->

            <div class="col-lg-2 col-md-4 mb-3">

                <label class="form-label">

                    ESIC

                </label>

                <input
                    type="number"
                    id="esic"
                    class="form-control"
                    value="0">

            </div>

            <!-- Professional Tax -->

            <div class="col-lg-2 col-md-4 mb-3">

                <label class="form-label">

                    Professional Tax

                </label>

                <input
                    type="number"
                    id="professionalTax"
                    class="form-control"
                    value="0">

            </div>

            <!-- Monthly Salary -->

            <div class="col-lg-3 col-md-6 mb-3">

                <label class="form-label fw-bold">

                    Monthly Salary

                </label>

                <input
                    type="number"
                    id="monthlySalary"
                    class="form-control bg-light fw-bold"
                    readonly>

            </div>
      <!-- ==========================================================
     Address Information
=========================================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-success text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-location-dot me-2"></i>

            Address Information

        </h5>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-12 mb-3">

                <label class="form-label">

                    Permanent Address

                </label>

                <textarea
                    id="permanentAddress"
                    rows="3"
                    class="form-control"></textarea>

            </div>

            <div class="col-md-12 mb-3">

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="sameAddress">

                    <label class="form-check-label">

                        Current Address Same As Permanent Address

                    </label>

                </div>

            </div>

            <div class="col-12 mb-3">

                <label class="form-label">

                    Current Address

                </label>

                <textarea
                    id="currentAddress"
                    rows="3"
                    class="form-control"></textarea>

            </div>

            <div class="col-lg-3 mb-3">

                <label class="form-label">Country</label>

                <input
                    type="text"
                    id="country"
                    value="India"
                    class="form-control">

            </div>

            <div class="col-lg-3 mb-3">

                <label class="form-label">State</label>

                <input
                    type="text"
                    id="state"
                    class="form-control">

            </div>

            <div class="col-lg-3 mb-3">

                <label class="form-label">District</label>

                <input
                    type="text"
                    id="district"
                    class="form-control">

            </div>

            <div class="col-lg-3 mb-3">

                <label class="form-label">City</label>

                <input
                    type="text"
                    id="city"
                    class="form-control">

            </div>

            <div class="col-lg-3 mb-3">

                <label class="form-label">PIN Code</label>

                <input
                    type="text"
                    id="pinCode"
                    class="form-control">

            </div>

        </div>

    </div>

</div>
        </div>

    </div>

</div>
<div class="card shadow-sm mb-4">

    <div class="card-header bg-primary text-white">

        <h5 class="mb-0">
            <i class="fa-solid fa-building-columns me-2"></i>
            Bank Details
        </h5>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-lg-4 mb-3">
                <label class="form-label">Bank Name</label>
                <input type="text"
                       id="bankName"
                       class="form-control">
            </div>

            <div class="col-lg-4 mb-3">
                <label class="form-label">Account Holder Name</label>
                <input type="text"
                       id="accountHolder"
                       class="form-control">
            </div>

            <div class="col-lg-4 mb-3">
                <label class="form-label">Account Number</label>
                <input type="text"
                       id="accountNumber"
                       class="form-control">
            </div>

            <div class="col-lg-4 mb-3">
                <label class="form-label">IFSC Code</label>
                <input type="text"
                       id="ifscCode"
                       class="form-control text-uppercase">
            </div>

            <div class="col-lg-4 mb-3">
                <label class="form-label">Branch Name</label>
                <input type="text"
                       id="branchName"
                       class="form-control">
            </div>

            <div class="col-lg-4 mb-3">
                <label class="form-label">UPI ID</label>
                <input type="text"
                       id="upiId"
                       class="form-control">
            </div>

        </div>

    </div>

</div>
<div class="modal-footer bg-light border-top">

    <button
        type="button"
        class="btn btn-secondary"
        data-bs-dismiss="modal">

        <i class="fa fa-times"></i>

        Cancel

    </button>
&nbsp;&nbsp;
    <button
        type="reset"
        class="btn btn-warning">

        <i class="fa fa-rotate-left"></i>

        Reset

    </button>
&nbsp;&nbsp;
    <button
       onclick="saveEmployee()"
        class="btn btn-success"
        id="btnSaveEmployeess">

        <i class="fa fa-save"></i>

        Save Employee

    </button>

</div>

</form>

</div>

</div>
</div>
</div>
    </div>

</body>
<html>
